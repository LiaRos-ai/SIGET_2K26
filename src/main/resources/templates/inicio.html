<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión de Tareas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm mx-auto" style="max-width: 560px;">
            <div class="card-body text-center">
                <h1 class="h4 text-success" th:text="${mensaje}">Mensaje</h1>
                <p class="text-muted mb-1" th:text="${proyecto}">Proyecto</p>
                <span class="badge bg-primary" th:text="${sprint}">Sprint</span>
                <hr>
                <p class="small text-secondary mb-0">
                    Programación Web II · Proyecto guía
                </p>
            </div>
        </div>
    </div>
</body>
</html>
