<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Gestión de Tareas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <!-- th:replace SUSTITUYE este <div> por completo con el <nav> del fragmento -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="row justify-content-center">
            <!-- col-md-6: en pantallas medianas o más grandes ocupa la mitad;
                 en celulares (xs/sm) ocupa el 100% del ancho -->
            <div class="col-12 col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body text-center">
                        <h1 class="h4 text-success" th:text="${mensaje}">Mensaje</h1>
                        <p class="text-muted mb-1" th:text="${proyecto}">Proyecto</p>
                        <span class="badge bg-primary" th:text="${sprint}">Sprint</span>
                        <hr>
                        <a href="/tareas" class="btn btn-sm btn-primary">Ver listado de tareas</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
