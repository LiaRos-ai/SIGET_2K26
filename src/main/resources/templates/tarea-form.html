<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nueva tarea</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">
                <h1 class="h4 mb-3">Nueva tarea</h1>

                <!-- th:object ata el formulario completo al objeto "tarea" del Model.
                     A partir de acá, th:field="{titulo}" se refiere a tarea.titulo -->
                <form th:action="@{/tareas}" th:object="${tarea}" method="post" class="card card-body shadow-sm">

                    <div class="mb-3">
                        <label class="form-label">Título</label>
                        <!-- th:field genera automáticamente id, name y value -->
                        <input type="text" th:field="*{titulo}" class="form-control"
                               th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid'" />

                        <!-- th:errors muestra el mensaje definido en @NotBlank/@Size si el campo falló -->
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}">
                            Error en el título
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="/tareas" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
