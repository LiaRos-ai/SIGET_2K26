<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de tareas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 mb-0">Sistema de Gestión de Tareas</h1>
            <span class="badge bg-secondary" th:text="'Total: ' + ${totalTareas}">Total: 0</span>
        </div>

        <!-- th:if / th:unless: mostrar un mensaje distinto según si hay datos -->
        <div th:if="${tareas.isEmpty()}" class="alert alert-info">
            Todavía no hay tareas registradas.
        </div>

        <div th:unless="${tareas.isEmpty()}" class="list-group">
            <!-- th:each: recorre la lista de tareas que envió el Controller -->
            <a th:each="tarea : ${tareas}"
               th:href="@{/tareas/{id}(id=${tarea.id})}"
               class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">

                <!-- th:text: inserta el valor del atributo dentro de la etiqueta -->
                <span th:text="${tarea.titulo}">Título de la tarea</span>

                <!-- th:if / th:unless anidados dentro del th:each -->
                <span th:if="${tarea.completada}" class="badge bg-success">Completada</span>
                <span th:unless="${tarea.completada}" class="badge bg-warning text-dark">Pendiente</span>
            </a>
        </div>

        <p class="small text-muted mt-4 mb-0">
            Programación Web II · Proyecto guía · Sprint 1 (Día 3) · Vistas con Thymeleaf
        </p>
    </div>
</body>
</html>
