<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Listado de tareas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">Tareas</h1>
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-secondary" th:text="'Total: ' + ${totalTareas}">Total: 0</span>
                <a href="/tareas/nueva" class="btn btn-sm btn-success">+ Nueva tarea</a>
            </div>
        </div>

        <!-- th:insert MANTIENE este <div> y agrega el <p> del fragmento adentro -->
        <div class="tareas-aviso"
             th:insert="~{fragments/aviso :: aviso('Tocá una tarea para ver su detalle.')}"></div>

        <div th:if="${tareas.isEmpty()}" class="alert alert-warning">
            Todavía no hay tareas registradas.
        </div>

        <!-- row-cols-*: 1 columna en celulares, 2 en tablets, 3 en escritorio -->
        <div th:unless="${tareas.isEmpty()}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
            <div class="col" th:each="tarea : ${tareas}">
                <a th:href="@{/tareas/{id}(id=${tarea.id})}" class="text-decoration-none">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <span th:text="${tarea.titulo}" class="text-dark">Título</span>
                            <span th:if="${tarea.completada}" class="badge bg-success">Completada</span>
                            <span th:unless="${tarea.completada}" class="badge bg-warning text-dark">Pendiente</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
