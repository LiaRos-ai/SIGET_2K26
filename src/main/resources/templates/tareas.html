<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Listado de tareas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">Tareas</h1>
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-secondary" th:text="'Total: ' + ${totalTareas}">Total: 0</span>
                <a href="/tareas/nueva" class="btn btn-sm btn-success">+ Nueva tarea</a>
            </div>
        </div>

        <!-- Filtro con @RequestParam: cada link agrega ?completada=... a la URL -->
        <div class="btn-group btn-group-sm mb-3" role="group">
            <a th:href="@{/tareas}" class="btn btn-outline-secondary"
               th:classappend="${filtroActual == null} ? 'active'">Todas</a>
            <a th:href="@{/tareas(completada=false)}" class="btn btn-outline-secondary"
               th:classappend="${filtroActual != null and !filtroActual} ? 'active'">Pendientes</a>
            <a th:href="@{/tareas(completada=true)}" class="btn btn-outline-secondary"
               th:classappend="${filtroActual != null and filtroActual} ? 'active'">Completadas</a>
        </div>

        <!-- th:insert MANTIENE este <div> y agrega el <p> del fragmento adentro -->
        <div class="tareas-aviso"
             th:insert="~{fragments/aviso :: aviso('Tocá el título para ver el detalle.')}"></div>

        <div th:if="${tareas.isEmpty()}" class="alert alert-warning">
            Todavía no hay tareas con ese filtro.
        </div>

        <!-- row-cols-*: 1 columna en celulares, 2 en tablets, 3 en escritorio -->
        <div th:unless="${tareas.isEmpty()}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
            <div class="col" th:each="tarea : ${tareas}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <a th:href="@{/tareas/{id}(id=${tarea.id})}" th:text="${tarea.titulo}"
                           class="text-decoration-none text-dark">Título</a>

                        <div class="d-flex align-items-center gap-2">
                            <span th:if="${tarea.categoria != null}" class="badge bg-info text-dark"
                                  th:text="${tarea.categoria.nombre}">Categoría</span>
                            <span th:if="${tarea.completada}" class="badge bg-success">Completada</span>
                            <span th:unless="${tarea.completada}" class="badge bg-warning text-dark">Pendiente</span>

                            <!-- POST /tareas/{id}/completar: alterna el estado (Día 6) -->
                            <form th:action="@{/tareas/{id}/completar(id=${tarea.id})}" method="post">
                                <button type="submit" class="btn btn-sm btn-outline-primary">↺</button>
                            </form>
                        </div>
                    </div>

                    <!-- Día 8: acciones de edición y eliminación (CRUD completo) -->
                    <div class="card-footer bg-white d-flex justify-content-end gap-2">
                        <a th:href="@{/tareas/{id}/editar(id=${tarea.id})}"
                           class="btn btn-sm btn-outline-secondary">Editar</a>

                        <!-- confirm() evita un borrado accidental con un solo clic -->
                        <form th:action="@{/tareas/{id}/eliminar(id=${tarea.id})}" method="post"
                              onsubmit="return confirm('¿Eliminar esta tarea? Esta acción no se puede deshacer.');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
