<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de tarea</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="/tareas" class="btn btn-sm btn-outline-secondary mb-4">&larr; Volver al listado</a>

        <div class="card shadow-sm" style="max-width: 480px;">
            <div class="card-body">
                <h1 class="h5" th:text="${tarea.titulo}">Título</h1>
                <p class="text-muted mb-2">ID: <span th:text="${tarea.id}">0</span></p>

                <span th:if="${tarea.completada}" class="badge bg-success">Completada</span>
                <span th:unless="${tarea.completada}" class="badge bg-warning text-dark">Pendiente</span>
            </div>
        </div>

        <p class="small text-muted mt-4 mb-0">
            Programación Web II · Proyecto guía · Sprint 1 (Día 3)
        </p>
    </div>
</body>
</html>
