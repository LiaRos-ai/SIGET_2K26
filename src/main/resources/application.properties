# =========================================================
# Sistema de Gestión de Tareas - Configuración (Día 7)
# =========================================================

spring.application.name=gestion-tareas

# --- Servidor ---
server.port=8081

# --- Base de datos (Día 7) ---
# Requiere un servidor MySQL corriendo localmente. La base "gestion_tareas"
# se crea sola gracias a "createDatabaseIfNotExist=true" (solo funciona en
# MySQL; en PostgreSQL hay que crear la base a mano antes de arrancar).
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_tareas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# ddl-auto=update: Hibernate crea/actualiza las tablas automáticamente a
# partir de las entidades @Entity. Cómodo para desarrollo; en producción
# se prefieren migraciones controladas (Flyway/Liquibase, fuera del
# alcance de este curso).
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola el SQL real que genera Hibernate — muy útil para
# entender qué está pasando "debajo" de JpaRepository.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Alternativa PostgreSQL (comentada): descomentar estas 3 líneas, comentar
# las 3 de MySQL de arriba, cambiar el driver en pom.xml (postgresql en
# vez de mysql-connector-j) y crear la base "gestion_tareas" a mano antes
# de arrancar (PostgreSQL no la crea sola).
#spring.datasource.url=jdbc:postgresql://localhost:5432/gestion_tareas
#spring.datasource.username=postgres
#spring.datasource.password=

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- DevTools ---
spring.devtools.restart.enabled=true

# --- Logging ---
logging.level.org.springframework=INFO
logging.level.com.tallerpw=DEBUG
