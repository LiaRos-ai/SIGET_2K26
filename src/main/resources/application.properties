# =========================================================
# Sistema de Gestión de Tareas - Configuración base (Día 1)
# =========================================================

spring.application.name=gestion-tareas

# --- Servidor ---
server.port=8081

# --- Base de datos ---
# Sprint 0: H2 embedded database (desarrollo en memoria)
spring.datasource.url=jdbc:h2:mem:gestion_tareas
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Descomentar y cambiar a MySQL/PostgreSQL cuando se conecte BD real (a partir del Día 7).
# spring.datasource.url=jdbc:mysql://localhost:3306/gestion_tareas?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- DevTools ---
spring.devtools.restart.enabled=true

# --- Logging ---
logging.level.org.springframework=INFO
logging.level.com.tallerpw=DEBUG
